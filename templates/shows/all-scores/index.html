{% extends "base.html" %}
{% block title %}All Scores | Shows{% endblock %}

{% block content %}
<div class="page-breadcrumb">
    <a href="{{ url_for('shows_index') }}">Shows</a>
</div>

<h1>Shows</h1>
<p>
    Choose from one of the years below to view the available shows for that year.
</p>

<ul class="collection">
    {% for year in show_years %}
    <li class="collection-item">
        <a href="{{ url_for('shows_all_scores_by_year', year=year) }}">{{ year }}</a>
    </li>
    {% endfor %}
</ul>

{% endblock %}
